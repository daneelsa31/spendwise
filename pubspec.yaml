name: spendwise
description: A personal expense tracker built with Hive local storage.
publish_to: 'none'
version: 1.0.0+1
 
environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3           # Core Hive database package
  hive_flutter: ^1.1.0   # Flutter-specific Hive extensions (Hive.initFlutter, ValueListenable)
  intl: ^0.19.0          # Date formatting (DateFormat)
  path_provider: ^2.1.4  # Required for Exercise 3 file export
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1 # Generates TypeAdapter classes from annotations
  build_runner: ^2.4.9   # Runs the code generators
  flutter_lints: ^4.0.0
 
flutter:
  uses-material-design: true
